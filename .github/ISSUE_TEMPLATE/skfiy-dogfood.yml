name: skfiy dogfood report
description: Report a real packaged-app skfiy dogfood run with reproducible evidence.
title: "[dogfood] "
labels:
  - skfiy
  - dogfood
body:
  - type: markdown
    attributes:
      value: |
        Use this for a single real packaged-app dogfood report only. Run from `dist/skfiy.app` or an alpha zip generated by `npm run alpha:artifact`; do not report `npm start`, Vite, tmux, or direct helper-only runs as product evidence. Maintainers aggregate 3-5 reports into `.skfiy-dogfood/internal-alpha-cohort.json` and run `npm run dogfood:cohort -- --cohort <path>`. Blocked reports can count toward cohort coverage only when they still include manifest, artifacts, permission states, `appLaunchViaOpen=true`, and `runnerHasTmux=false`.

  - type: input
    id: alpha_manifest
    attributes:
      label: alpha manifest
      description: Path or attachment name for `.skfiy-alpha/skfiy-<version>-<commit>-macos-unsigned.json`.
      placeholder: .skfiy-alpha/skfiy-0.1.0-677d27d-macos-unsigned.json
    validations:
      required: true

  - type: input
    id: alpha_zip
    attributes:
      label: alpha zip
      description: Path or attachment name for the unsigned alpha zip.
      placeholder: .skfiy-alpha/skfiy-0.1.0-677d27d-macos-unsigned.zip
    validations:
      required: true

  - type: input
    id: commit_sha
    attributes:
      label: commit sha
      description: Commit SHA from the alpha manifest.
      placeholder: 677d27d1cced8e0fda09e3cd2786a901ddddde64
    validations:
      required: true

  - type: input
    id: tester_id
    attributes:
      label: tester id
      description: Stable anonymized tester id used for `cohort.distinctTesters`; do not use a display name that might change.
      placeholder: tester-a
    validations:
      required: true

  - type: checkboxes
    id: cohort_workflows
    attributes:
      label: cohort workflows
      description: Select every workflow this report exercises. The cohort gate requires coverage for all four workflow ids.
      options:
        - label: coding-terminal
        - label: screenshot-inspection
        - label: finder-file
        - label: browser-fallback

  - type: input
    id: ui_smoke_artifact
    attributes:
      label: UI smoke artifact
      description: Path or attachment name for `npm run smoke:ui -- --output <path>` JSON evidence.
      placeholder: .skfiy-smoke/ui-permission-onboarding.json
    validations:
      required: true

  - type: input
    id: smoke_artifact
    attributes:
      label: smoke artifact
      description: Path or attachment name for `npm run smoke:ghostty -- --output <path>` JSON evidence.
      placeholder: .skfiy-smoke/ghostty-matrix-9260.json
    validations:
      required: true

  - type: input
    id: chrome_smoke_artifact
    attributes:
      label: Chrome smoke artifact
      description: Path or attachment name for `npm run smoke:chrome -- --output <path>` JSON evidence.
      placeholder: .skfiy-smoke/chrome-page.json
    validations:
      required: true

  - type: input
    id: finder_smoke_artifact
    attributes:
      label: Finder smoke artifact
      description: Path or attachment name for `npm run smoke:finder -- --output <path>` JSON evidence.
      placeholder: .skfiy-smoke/finder-item-drag-drop.json
    validations:
      required: true

  - type: input
    id: voice_smoke_artifact
    attributes:
      label: voice smoke artifact
      description: Path or attachment name for `npm run smoke:voice -- --output <path>` JSON evidence.
      placeholder: .skfiy-smoke/voice-native.json
    validations:
      required: true

  - type: dropdown
    id: runner_has_tmux
    attributes:
      label: runnerHasTmux
      description: Copy this from the smoke artifact JSON. `true` is rejected by `dogfood:cohort` and cannot count as product evidence.
      options:
        - "false"
        - "true"
    validations:
      required: true

  - type: dropdown
    id: screen_recording
    attributes:
      label: Screen Recording
      description: Permission state for the tested skfiy.app bundle.
      options:
        - granted
        - denied
        - not-determined
        - unknown
    validations:
      required: true

  - type: dropdown
    id: accessibility
    attributes:
      label: Accessibility
      description: Permission state for the tested skfiy.app bundle.
      options:
        - granted
        - denied
        - not-determined
        - unknown
    validations:
      required: true

  - type: dropdown
    id: microphone
    attributes:
      label: Microphone
      description: Permission state for the tested skfiy.app bundle.
      options:
        - granted
        - denied
        - not-determined
        - unknown
    validations:
      required: true

  - type: dropdown
    id: speech_recognition
    attributes:
      label: Speech Recognition
      description: Permission state when testing the native macOS ASR provider.
      options:
        - granted
        - denied
        - not-determined
        - unknown
        - not tested
    validations:
      required: true

  - type: dropdown
    id: asr_provider
    attributes:
      label: ASR provider
      description: Provider used for the reported voice turn.
      options:
        - doubao
        - browser
        - native-macos
        - not tested
    validations:
      required: true

  - type: dropdown
    id: computer_use_result
    attributes:
      label: Computer Use result
      description: Top-level `result` from the smoke artifact or product-path run.
      options:
        - passed
        - blocked
        - needs-user-confirmation
        - denied
        - failed
        - not tested
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: before screenshot / after screenshot
      description: Paste before screenshot and after screenshot paths from replay evidence when Computer Use passes; write `not available` when the run is permission-blocked before screenshots.
      placeholder: |
        before screenshot: /tmp/skfiy/ghostty-before-...
        after screenshot: /tmp/skfiy/ghostty-after-...
    validations:
      required: true

  - type: textarea
    id: action_verification
    attributes:
      label: action verification events
      description: Paste `Verified type_text` and `Verified press_key` event messages from Ghostty smoke when Computer Use passes; write `not available` when the run is permission-blocked before actions.
      placeholder: |
        Verified type_text: type_text helper result accepted.
        Verified press_key: press_key helper result accepted.
    validations:
      required: true

  - type: textarea
    id: app_policy_settings
    attributes:
      label: app policy settings
      description: Paste the Ghostty, Chrome, and Finder entries from `appPolicySettings` in the smoke artifacts.
      placeholder: |
        { "name": "Ghostty", "bundleId": "com.mitchellh.ghostty", "policy": "allow" }
        { "name": "Chrome", "bundleId": "com.google.Chrome", "policy": "ask" }
        { "name": "Finder", "bundleId": "com.apple.finder", "policy": "ask" }
    validations:
      required: true

  - type: textarea
    id: chrome_extraction
    attributes:
      label: Chrome extracted text
      description: Paste Chrome smoke product path, extractedText, navigate/extract verification events, current-page observation evidence, optional real current-page BYO observation evidence, sensitive-page pause evidence, and screenshot fallback switching evidence.
      placeholder: |
        productPath: renderer -> preload -> main -> CDP -> Chrome
        extractedText: skfiy chrome smoke ready
        Verified navigate: Navigated to: ...
        Verified extract_text: Extracted text: ...
        Chrome current-page observation:
        currentPageRun.result: passed
        currentPageRun.command: 观察 Chrome 当前页面并提取正文
        currentPageRun.pageSnapshot.text: skfiy chrome smoke ready
        Verified current_page_snapshot: Observed current page: ...
        Chrome current page extracted: skfiy chrome smoke ready
        Chrome real current-page BYO observation:
        command: npm run smoke:chrome -- --current-page-endpoint http://127.0.0.1:9222 --output .skfiy-smoke/chrome-real-page.json
        realCurrentPageRun.result: passed
        realCurrentPageRun.pageSnapshot.url: https://...
        realCurrentPageRun.pageSnapshot.text: ...
        --current-page-endpoint: http://127.0.0.1:9222
        Chrome sensitive-page pause:
        result: sensitive-paused
        Verification failed (sensitive): Sensitive UI text is visible.
        Chrome form action:
        formRun.result: passed
        formRun.fields: #name, #email, #role
        formRun.extractedText: skfiy agent@skfiy.test operator form submitted
        Verified fill_selector: Filled #name.
        Verified fill_selector: Filled #email.
        Verified fill_selector: Filled #role.
        Verified click_selector: Clicked #submit.
        Chrome screenshot fallback:
        fallbackRun.result: fallback-observed or fallback-blocked
        fallbackRun.productPath: renderer -> preload -> main -> helper observe_app -> Chrome screenshot fallback
        Captured before screenshot: ... or screenshot fallback failed: Screen Recording permission is required
        Chrome fallback switching:
        fallbackSwitchRun.result: fallback-switched-observed or fallback-switched-blocked
        fallbackSwitchRun.productPath: renderer -> preload -> main -> CDP failure -> helper observe_app -> Chrome screenshot fallback
        Switching Chrome control from CDP to screenshot_fallback
    validations:
      required: true

  - type: textarea
    id: finder_observation
    attributes:
      label: Finder observe_app
      description: Paste Finder `finderObservation` from the smoke artifact, including screenshot path/frontmost bundle when passed or the permission-blocked reason.
      placeholder: |
        finderObservation.result: passed
        finderObservation.screenshotPath: /tmp/skfiy/finder-before-...
        finderObservation.frontmostBundleId: com.apple.finder
        finderObservation.windowCount: 1
    validations:
      required: true

  - type: textarea
    id: finder_semantic_selection
    attributes:
      label: Finder semantic selection
      description: Paste Finder `finderSemanticObservation` from the smoke artifact, including source/frontmost bundle/selected count when passed or the permission-blocked reason. For `--current-folder` runs, include `targetPath`; for `--selected-folder` runs, include the selected directory item.
      placeholder: |
        targetMode: selected-finder-folder
        fixtureRoot: /tmp/skfiy-finder-smoke
        finderSemanticObservation.result: passed
        finderSemanticObservation.source: finder-applescript
        finderSemanticObservation.frontmostBundleId: com.apple.finder
        finderSemanticObservation.targetPath: /tmp
        finderSemanticObservation.selectedCount: 1
        finderSemanticObservation.selectedItems[0].path: /tmp/skfiy-finder-smoke
        finderSemanticObservation.selectedItems[0].kind: directory
    validations:
      required: true

  - type: textarea
    id: finder_plan_preview
    attributes:
      label: Finder plan preview
      description: Paste Finder `finderPlanPreview` from the smoke artifact and the matching task event. It must appear before file operations and report zero destructive operations.
      placeholder: |
        finderPlanPreview.result: passed
        finderPlanPreview.rootPath: /tmp/skfiy-finder-smoke
        finderPlanPreview.operationCount: 6
        finderPlanPreview.destructiveOperationCount: 0
        finderPlanPreview.createFolders: Images, Documents, Code
        finderPlanPreview.moveFiles: photo.png -> Images/photo.png, notes.pdf -> Documents/notes.pdf, script.ts -> Code/script.ts
        Finder plan preview: 3 folders, 3 moves, 0 destructive operations.
    validations:
      required: true

  - type: textarea
    id: finder_plan_confirmation
    attributes:
      label: Finder plan confirmation
      description: For `--current-folder` or `--selected-folder` runs, paste `finderPlanConfirmation` from the smoke artifact. It proves the user confirmed after preview and before file operations.
      placeholder: |
        finderPlanConfirmation.result: passed
        finderPlanConfirmation.reason: Finder current-folder organization needs confirmation after plan preview.
        finderPlanConfirmation.confirmedAfterPreview: true
    validations:
      required: true

  - type: textarea
    id: finder_organization
    attributes:
      label: Finder before tree / after tree
      description: Paste Finder smoke beforeTree, afterTree, item drag/drop evidence, and create/move verification events.
      placeholder: |
        beforeTree: notes.pdf, photo.png, script.ts
        afterTree: Documents/notes.pdf, Images/photo.png, Code/script.ts
        finderItemDragDrop.result: passed
        finderItemDragDrop.source: finder-applescript-layout+hid-drag
        finderItemDragDrop.movedItem: photo.png
        finderItemDragDrop.targetItem: Images
        Verified item_drag_drop: Dragged Finder item: ...
        Verified create_folder: Created folder: ...
        Verified move_file: Moved file: ...
    validations:
      required: true

  - type: textarea
    id: clipboard_approval_runs
    attributes:
      label: clipboard approval runs
      description: Paste the `clipboard-read-approval` and `clipboard-write-approval` run entries from the Ghostty matrix smoke artifact.
      placeholder: |
        clipboard-read-approval: needs-user-confirmation, pbpaste, Command can read or overwrite clipboard contents.
        clipboard-write-approval: needs-user-confirmation, echo skfiy | pbcopy, Command can read or overwrite clipboard contents.
    validations:
      required: true

  - type: textarea
    id: voice_and_stop
    attributes:
      label: Voice and panic stop notes
      description: Include start/stop behavior, provider failure messages, native voice transcript-to-task evidence, and whether panic stop / global stop hotkey was tested.
      placeholder: |
        ASR provider:
        transcript observed:
        Native voice transcript-to-task evidence:
        transcriptEvents:
        taskEvents:
        panic stop:
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Include the exact launch, smoke, and alpha artifact commands used.
      placeholder: |
        npm run build
        npm run smoke:ui -- --output .skfiy-smoke/ui-permission-onboarding.json
        npm run smoke:ghostty -- --matrix --output .skfiy-smoke/ghostty-matrix.json
        npm run smoke:chrome -- --require-passed --output .skfiy-smoke/chrome-page.json
        npm run smoke:finder -- --item-drag-drop --require-passed --output .skfiy-smoke/finder-item-drag-drop.json
        npm run smoke:voice -- --output .skfiy-smoke/voice-native.json
        npm run alpha:artifact -- --ui-smoke-artifact .skfiy-smoke/ui-permission-onboarding.json --smoke-artifact .skfiy-smoke/ghostty-matrix.json --chrome-smoke-artifact .skfiy-smoke/chrome-page.json --finder-smoke-artifact .skfiy-smoke/finder-item-drag-drop.json --voice-smoke-artifact .skfiy-smoke/voice-native.json
    validations:
      required: true

  - type: textarea
    id: expected_actual
    attributes:
      label: Expected vs actual
      description: What should skfiy have done, and what happened instead?
    validations:
      required: true
